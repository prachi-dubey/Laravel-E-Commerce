services:
  app:
    build:
      context: .
      dockerfile: dev/php/Dockerfile
    image: ecommerce-api
    container_name: ecommerce-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html:delegated
      - /var/www/html/vendor
    networks:
      - ecommerce-net

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommerce_catalog
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  redis:
    image: redis:alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6384:6379"
    networks:
      - ecommerce-net

  nginx:
    build:
      context: ./dev/nginx/
      dockerfile: Dockerfile
    image: ecommerce/nginx
    container_name: ecommerce-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "84:80"
    volumes:
      - ./:/var/www/html
    networks:
      - ecommerce-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ecommerce-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge

volumes:
  dbdata:
    driver: local
